<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 40px; }
        .header { background: #1E3A5F; color: #fff; padding: 24px; border-radius: 8px 8px 0 0; text-align: center; }
        .body { padding: 24px 0; color: #333; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        th { background: #f0f0f0; padding: 10px; text-align: left; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .total { font-weight: bold; font-size: 15px; margin-top: 16px; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 32px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Pedido Confirmado</h2>
    </div>
    <div class="body">
        <p>Olá, <strong th:text="${userName}">Usuário</strong>!</p>
        <p>Seu pedido <strong>#<span th:text="${orderId}">ID</span></strong> foi confirmado com sucesso.</p>

        <table>
            <thead>
            <tr>
                <th>Produto</th>
                <th>Qtd</th>
                <th>Preço unit.</th>
                <th>Subtotal</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.productName}">Produto</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="'R$ ' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)}">R$ 0,00</td>
                <td th:text="'R$ ' + ${#numbers.formatDecimal(item.unitPrice * item.quantity, 1, 2)}">R$ 0,00</td>
            </tr>
            </tbody>
        </table>

        <p class="total">Total: R$ <span th:text="${#numbers.formatDecimal(totalAmount, 1, 2)}">0,00</span></p>
        <p th:if="${notes}">Observações: <em th:text="${notes}"></em></p>
    </div>
    <div class="footer">
        <p>© 2026 Corporate AI Assistant. Todos os direitos reservados.</p>
    </div>
</div>
</body>
</html>
