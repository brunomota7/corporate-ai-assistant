<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 40px; }
        .header { background: #1E3A5F; color: #fff; padding: 24px; border-radius: 8px 8px 0 0; text-align: center; }
        .body { padding: 24px 0; color: #333; line-height: 1.6; }
        .status-box { background: #f0f7ff; border-left: 4px solid #1E3A5F; padding: 16px; border-radius: 4px; margin: 16px 0; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 32px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Atualização de Pedido</h2>
    </div>
    <div class="body">
        <p>Olá, <strong th:text="${userName}">Usuário</strong>!</p>
        <p>O status do seu pedido <strong>#<span th:text="${orderId}">ID</span></strong> foi atualizado.</p>
        <div class="status-box">
            <p>De: <strong th:text="${oldStatus}">Status anterior</strong></p>
            <p>Para: <strong th:text="${newStatus}">Novo status</strong></p>
        </div>
    </div>
    <div class="footer">
        <p>© 2026 Corporate AI Assistant. Todos os direitos reservados.</p>
    </div>
</div>
</body>
</html>
