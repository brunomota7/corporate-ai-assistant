<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 40px; }
        .header { background: #8B0000; color: #fff; padding: 24px; border-radius: 8px 8px 0 0; text-align: center; }
        .body { padding: 24px 0; color: #333; line-height: 1.6; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 32px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Pedido Cancelado</h2>
    </div>
    <div class="body">
        <p>Olá, <strong th:text="${userName}">Usuário</strong>!</p>
        <p>Seu pedido <strong>#<span th:text="${orderId}">ID</span></strong> foi cancelado.</p>
        <p>Valor do pedido: <strong>R$ <span th:text="${#numbers.formatDecimal(totalAmount, 1, 2)}">0,00</span></strong></p>
        <p>Se você não solicitou o cancelamento ou tem alguma dúvida, entre em contato com o suporte.</p>
    </div>
    <div class="footer">
        <p>© 2026 Corporate AI Assistant. Todos os direitos reservados.</p>
    </div>
</div>
</body>
</html>
